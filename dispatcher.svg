<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2c3e6e"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5cba7"/>
      <stop offset="100%" style="stop-color:#e8b88a"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a2c0a"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Shirt/body -->
  <ellipse cx="50" cy="90" rx="30" ry="20" fill="#f7b731"/>
  <rect x="20" y="75" width="60" height="25" rx="5" fill="#f7b731"/>
  <!-- Neck -->
  <rect x="43" y="62" width="14" height="14" fill="url(#face)"/>
  <!-- Head -->
  <ellipse cx="50" cy="52" rx="22" ry="24" fill="url(#face)"/>
  <!-- Hair -->
  <ellipse cx="50" cy="32" rx="22" ry="16" fill="url(#hair)"/>
  <rect x="28" y="32" width="4" height="20" rx="2" fill="url(#hair)"/>
  <rect x="68" y="32" width="4" height="20" rx="2" fill="url(#hair)"/>
  <ellipse cx="50" cy="30" rx="22" ry="8" fill="url(#hair)"/>
  <!-- Eyes -->
  <ellipse cx="42" cy="52" rx="4" ry="4.5" fill="#fff"/>
  <ellipse cx="58" cy="52" rx="4" ry="4.5" fill="#fff"/>
  <circle cx="43" cy="53" r="2.5" fill="#2c1810"/>
  <circle cx="59" cy="53" r="2.5" fill="#2c1810"/>
  <circle cx="44" cy="52" r="0.8" fill="#fff"/>
  <circle cx="60" cy="52" r="0.8" fill="#fff"/>
  <!-- Eyebrows -->
  <path d="M37 47 Q42 44 47 47" stroke="#4a2c0a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M53 47 Q58 44 63 47" stroke="#4a2c0a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M50 55 Q48 60 46 61 Q50 63 54 61 Q52 60 50 55" fill="#d4956a" opacity="0.5"/>
  <!-- Smile -->
  <path d="M43 65 Q50 71 57 65" stroke="#c0704a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Headset -->
  <path d="M27 48 Q27 30 50 28 Q73 30 73 48" stroke="#1a1a2e" stroke-width="3" fill="none"/>
  <rect x="23" y="47" width="7" height="10" rx="3" fill="#f7b731"/>
  <rect x="70" y="47" width="7" height="10" rx="3" fill="#f7b731"/>
  <!-- Badge -->
  <circle cx="75" cy="72" r="10" fill="#f7b731"/>
  <text x="75" y="76" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">AI</text>
</svg>
