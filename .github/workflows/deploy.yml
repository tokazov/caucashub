name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api-production-f3ea.up.railway.app
          NEXT_PUBLIC_YANDEX_KEY: aef19e33-8ea1-4039-8353-2f0df688664a

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        run: npx wrangler pages deploy out/ --project-name=caucashub --branch=master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 42c8b5c5e608bab52771ec762edd61ff
